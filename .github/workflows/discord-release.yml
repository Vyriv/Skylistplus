name: Discord Release Notify

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Build payload and send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          BODY: ${{ github.event.release.body }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RELEASE_ROLE_ID: "1496926549213970432"
        run: |
          DISCORD_WEBHOOK=$(printf '%s' "$DISCORD_WEBHOOK" | tr -d '\r\n')

          case "$DISCORD_WEBHOOK" in
            https://discord.com/api/webhooks/*|https://discordapp.com/api/webhooks/*)
              ;;
            *)
              echo "::error::DISCORD_WEBHOOK is missing or is not a valid Discord webhook URL."
              exit 1
              ;;
          esac

          if [ "$EVENT_NAME" = "release" ] && [ -n "$RELEASE_URL" ]; then
            TITLE="${RELEASE_NAME:-$TAG_NAME}"
            URL="$RELEASE_URL"
            DESC="${BODY:-No description provided.}"
          else
            RELEASE_JSON=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/releases/latest")

            TITLE=$(echo "$RELEASE_JSON" | jq -r '.name // .tag_name // "Latest release"')
            URL=$(echo "$RELEASE_JSON" | jq -r '.html_url')
            DESC=$(echo "$RELEASE_JSON" | jq -r '.body // "No description provided."')
          fi

          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "::error::Could not determine release URL."
            exit 1
          fi

          if [ ${#DESC} -gt 4000 ]; then
            DESC="${DESC:0:4000}..."
          fi

          CONTENT=""
          if [ "$EVENT_NAME" = "release" ]; then
            CONTENT="<@&$RELEASE_ROLE_ID> New release published."
          fi

          payload=$(jq -n \
            --arg content "$CONTENT" \
            --arg title "$TITLE" \
            --arg url "$URL" \
            --arg desc "$DESC" \
            --arg githubReleasesUrl "https://github.com/$REPO/releases/latest" \
            --arg modrinthReleasesUrl "https://modrinth.com/mod/skylist+/versions" \
            --arg releaseRoleId "$RELEASE_ROLE_ID" \
            '{
              content: $content,
              allowed_mentions: {
                parse: [],
                roles: [$releaseRoleId]
              },
              embeds: [
                {
                  title: $title,
                  url: $url,
                  description: $desc,
                  color: 5814783
                }
              ],
              components: [
                {
                  type: 1,
                  components: [
                    {
                      type: 2,
                      style: 5,
                      label: "GitHub Releases",
                      url: $githubReleasesUrl
                    },
                    {
                      type: 2,
                      style: 5,
                      label: "Modrinth Releases",
                      url: $modrinthReleasesUrl
                    }
                  ]
                }
              ]
            }')

          curl --fail-with-body --silent --show-error \
               -H "Content-Type: application/json" \
               -d "$payload" \
               "${DISCORD_WEBHOOK}?wait=true&with_components=true"
