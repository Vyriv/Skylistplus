name: Discord Release Notify

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Build payload and send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          BODY: ${{ github.event.release.body }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "release" ] && [ -n "$RELEASE_URL" ]; then
            TITLE="${RELEASE_NAME:-$TAG_NAME}"
            URL="$RELEASE_URL"
            DESC="${BODY:-No description provided.}"
          else
            RELEASE_JSON=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/releases/latest")

            TITLE=$(echo "$RELEASE_JSON" | jq -r '.name // .tag_name // "Latest release"')
            URL=$(echo "$RELEASE_JSON" | jq -r '.html_url')
            DESC=$(echo "$RELEASE_JSON" | jq -r '.body // "No description provided."')
          fi

          if [ ${#DESC} -gt 4000 ]; then
            DESC="${DESC:0:4000}..."
          fi

          payload=$(jq -n \
            --arg content "@everyone" \
            --arg title "$TITLE" \
            --arg url "$URL" \
            --arg desc "$DESC" \
            '{
              content: $content,
              allowed_mentions: { parse: ["everyone"] },
              embeds: [
                {
                  title: $title,
                  url: $url,
                  description: $desc,
                  color: 5814783
                }
              ],
              components: [
                {
                  type: 1,
                  components: [
                    {
                      type: 2,
                      style: 5,
                      label: "GitHub Releases",
                      url: "https://github.com/Vyriv/Skylistplus/releases/latest"
                    },
                    {
                      type: 2,
                      style: 5,
                      label: "Modrinth Releases",
                      url: "https://modrinth.com/mod/skylist-plus/versions"
                    }
                  ]
                }
              ]
            }')

          curl -H "Content-Type: application/json" \
               -d "$payload" \
               "$DISCORD_WEBHOOK"
